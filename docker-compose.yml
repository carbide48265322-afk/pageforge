services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pageforge-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - app-data:/app/data
      - app-templates:/app/templates
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  app-data:
  app-templates:
