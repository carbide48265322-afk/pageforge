<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebContainer 演示</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .counter {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 30px;
            margin: 30px 0;
            backdrop-filter: blur(10px);
        }

        .count-display {
            font-size: 4rem;
            font-weight: bold;
            margin: 20px 0;
            color: #ffd700;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
        }

        button {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            padding: 12px 24px;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .feature {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 20px;
            backdrop-filter: blur(5px);
        }

        .feature h3 {
            color: #ffd700;
            margin-top: 0;
        }

        .status {
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 WebContainer 演示</h1>
        <p>这是一个在浏览器中运行的 React 应用示例</p>

        <div class="counter">
            <h2>交互式计数器</h2>
            <div class="count-display" id="counter">0</div>
            <div class="buttons">
                <button onclick="decrement()">-</button>
                <button onclick="reset()">重置</button>
                <button onclick="increment()">+</button>
            </div>
        </div>

        <div class="features">
            <div class="feature">
                <h3>🚀 快速启动</h3>
                <p>无需配置，立即运行</p>
            </div>
            <div class="feature">
                <h3>💻 完整环境</h3>
                <p>支持 npm 包和构建工具</p>
            </div>
            <div class="feature">
                <h3>🌐 实时预览</h3>
                <p>代码更改即时生效</p>
            </div>
        </div>

        <div class="status">
            <strong>环境状态:</strong> <span id="status">运行中...</span>
        </div>
    </div>

    <script>
        let count = 0;

        function increment() {
            count++;
            updateDisplay();
        }

        function decrement() {
            count--;
            updateDisplay();
        }

        function reset() {
            count = 0;
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('counter').textContent = count;

            // 添加动画效果
            const counter = document.getElementById('counter');
            counter.style.transform = 'scale(1.2)';
            setTimeout(() => {
                counter.style.transform = 'scale(1)';
            }, 150);
        }

        // 模拟环境检测
        function checkEnvironment() {
            const statusElement = document.getElementById('status');
            if (window.WebContainer) {
                statusElement.textContent = 'WebContainer 环境已就绪';
                statusElement.style.color = '#4ade80';
            } else {
                statusElement.textContent = '在 WebContainer 中运行';
                statusElement.style.color = '#fbbf24';
            }
        }

        // 页面加载完成后检查环境
        document.addEventListener('DOMContentLoaded', checkEnvironment);

        // 添加一些交互动画
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('click', function() {
                this.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    this.style.transform = 'scale(1)';
                }, 100);
            });
        });
    </script>
</body>
</html>
