name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ── 代码变更摘要 ────────────────────────────────────────
  summary:
    name: PR / Change Summary
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate change summary
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.base_ref }}"
            HEAD="${{ github.head_ref }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.event.after }}"
          fi

          CHANGED=$(git diff --name-only "$BASE"...HEAD 2>/dev/null || git diff --name-only "$BASE" "$HEAD")

          FRONTEND_CHANGES=$(echo "$CHANGED" | grep -c "^frontend/" || true)
          BACKEND_CHANGES=$(echo "$CHANGED" | grep -c "^backend/" || true)
          DOCKER_CHANGES=$(echo "$CHANGED" | grep -cE "^(Dockerfile|docker-compose)" || true)
          WORKFLOW_CHANGES=$(echo "$CHANGED" | grep -c "^\.github/" || true)

          # 输出变更摘要
          {
            echo "### Changed files"
            echo ""
            echo "| Area | Files |"
            echo "|------|-------|"
            echo "| Frontend | ${FRONTEND_CHANGES} |"
            echo "| Backend | ${BACKEND_CHANGES} |"
            echo "| Docker | ${DOCKER_CHANGES} |"
            echo "| Workflows | ${WORKFLOW_CHANGES} |"
            echo ""
            echo "<details><summary>All changed files</summary>"
            echo ""
            echo '```'
            echo "$CHANGED"
            echo '```'
            echo "</details>"
          } >> "$GITHUB_OUTPUT"

          # 判断哪些 CI job 需要运行
          echo "run_frontend=$([ "$FRONTEND_CHANGES" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "run_backend=$([ "$BACKEND_CHANGES" -gt 0 ] && echo true || echo false)"

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const output = `### \`${{ github.head_ref }}\` CI Trigger

            ${{ steps.changes.outputs.CHANGED }}

            | Check | Status |
            |-------|--------|
            | Backend | ${{ steps.changes.outputs.run_backend == 'true' && '✅ Triggered' || '⏭️ Skipped (no changes)' }} |
            | Frontend | ${{ steps.changes.outputs.run_frontend == 'true' && '✅ Triggered' || '⏭️ Skipped (no changes)' }} |
            `;

            // 查找已有的 bot 评论并更新
            const comments = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.data.find(
              c => c.user.login === 'github-actions[bot]' && c.body.startsWith('### ')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: botComment.id,
                body: output,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body: output,
              });
            }

  # ── 后端快速检查 ────────────────────────────────────────
  backend-quick:
    name: PR / Backend Quick Check
    runs-on: ubuntu-latest
    needs: summary
    if: needs.summary.outputs.run_backend == 'true'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check . --output-format=github

      - name: Tests
        run: uv run pytest tests/ -v --tb=short -q

  # ── 前端快速检查 ────────────────────────────────────────
  frontend-quick:
    name: PR / Frontend Quick Check
    runs-on: ubuntu-latest
    needs: summary
    if: needs.summary.outputs.run_frontend == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc -b --noEmit

      - name: Build check
        run: npm run build

  # ── PR 状态门控 ────────────────────────────────────────
  pr-status:
    name: PR / Status Gate
    runs-on: ubuntu-latest
    if: always()
    needs: [backend-quick, frontend-quick, summary]
    steps:
      - name: Evaluate
        run: |
          echo "Summary:  ${{ needs.summary.result }}"
          echo "Backend:  ${{ needs.backend-quick.result }}"
          echo "Frontend: ${{ needs.frontend-quick.result }}"

          # 跳过的 job 不算失败
          BK="${{ needs.backend-quick.result }}"
          FK="${{ needs.frontend-quick.result }}"

          if [[ "$BK" == "failure" ]] || [[ "$FK" == "failure" ]]; then
            echo "::error::PR checks failed"
            exit 1
          fi

          if [[ "$BK" == "skipped" ]] && [[ "$FK" == "skipped" ]]; then
            echo "No relevant changes detected, passing"
          fi

          echo "PR checks passed!"
